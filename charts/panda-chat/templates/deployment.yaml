apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "panda-chat.hermesFullname" . }}
  labels: {{- include "panda-chat.labels" . | nindent 4 }}
spec:
  # Single replica: Hermes holds SQLite state on an RWO PVC.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: {{- include "panda-chat.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "panda-chat.labels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "panda-chat.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      # Per-container security contexts below; fsGroup lets every container
      # (and the init containers) share the PVC. Hermes is ALWAYS unprivileged
      # — only the panda-server sidecar is privileged (dockerd).
      securityContext:
        fsGroup: 10000
      initContainers:
        # Seed Hermes (and panda) config onto the PVC.
        - name: seed-config
          image: busybox:1.37
          command: ["sh", "-c"]
          args:
            - |
              set -eu
              mkdir -p /data
              new=$(sha256sum /config-src/config.yaml | cut -d' ' -f1)
              old=""
              [ -f /data/config.yaml ] && old=$(sha256sum /data/config.yaml | cut -d' ' -f1)
              [ "$new" != "$old" ] && cp /config-src/config.yaml /data/config.yaml || true
              {{- if .Values.panda.enabled }}
              mkdir -p /data/.config/panda /data/panda-storage
              cp /config-src/panda-config.yaml /data/.config/panda/config.yaml
              {{- end }}
          volumeMounts:
            - {name: config, mountPath: /config-src}
            - {name: data, mountPath: /data}
          securityContext:
            runAsNonRoot: true
            runAsUser: 10000
            runAsGroup: 10000
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
      containers:
        - name: hermes
          image: {{ include "panda-chat.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Unprivileged, always: this container executes LLM-driven shell
          # commands. It carries no bot credentials and no docker socket; it
          # reaches panda-server over 127.0.0.1 (shared pod netns).
          securityContext:
            runAsNonRoot: true
            runAsUser: 10000
            runAsGroup: 10000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: [ALL]
          command: ["/opt/panda/entrypoint.sh"]
          args: ["gateway", "run"]
          env:
            - {name: API_SERVER_HOST, value: "0.0.0.0"}
            - {name: API_SERVER_PORT, value: "8642"}
            - {name: API_SERVER_MODEL_NAME, value: "hermes-agent"}
            - name: API_SERVER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "panda-chat.secretName" . }}
                  key: API_SERVER_KEY
            - {name: HERMES_DATA_DIR, value: "/opt/data"}
            - {name: HERMES_UID, value: "10000"}
            - {name: HERMES_GID, value: "10000"}
            {{- if .Values.panda.enabled }}
            - {name: PANDA_SERVER_URL, value: "http://127.0.0.1:2480"}
            {{- end }}
            # Devnet context for the agent + skills.
            - {name: DEVNET_NETWORK, value: {{ .Values.network | quote }}}
            - {name: DEVNET_CHAIN_ID, value: {{ .Values.chainId | quote }}}
            {{- if .Values.devnetTools.faucet.enabled }}
            - {name: DEVNET_FAUCET_URL, value: {{ .Values.devnetTools.faucet.url | quote }}}
            {{- end }}
            {{- if .Values.devnetTools.join.enabled }}
            - {name: DEVNET_CONFIG_URL, value: {{ .Values.devnetTools.join.configUrl | quote }}}
            - {name: DEVNET_RPC_URL, value: {{ .Values.devnetTools.join.rpcUrl | quote }}}
            - {name: DEVNET_EXPLORER_URL, value: {{ .Values.devnetTools.join.explorerUrl | quote }}}
            {{- end }}
            {{- if .Values.langfuse.enabled }}
            # Langfuse keys come via envFrom (Secret); URL + env tag are plain.
            - {name: HERMES_LANGFUSE_BASE_URL, value: {{ .Values.langfuse.baseUrl | quote }}}
            - {name: HERMES_LANGFUSE_ENV, value: {{ .Values.langfuse.env | default .Values.network | quote }}}
            {{- end }}
          envFrom:
            # Hermes secret only (bearer, LLM key, langfuse) — the panda bot
            # credential lives in its own Secret on the sidecar.
            - secretRef:
                name: {{ include "panda-chat.secretName" . }}
                optional: true
          ports:
            - {name: http, containerPort: 8642, protocol: TCP}
          readinessProbe:
            httpGet: {path: /health, port: http}
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet: {path: /health, port: http}
            initialDelaySeconds: 30
            periodSeconds: 30
          resources: {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - {name: data, mountPath: /opt/data}
            - {name: config, mountPath: /config-src, readOnly: true}
        {{- if .Values.panda.enabled }}
        # panda-server + dockerd sidecar. Privileged (dockerd) and the ONLY
        # container holding the bot credential. Same image, "panda-stack" arg.
        - name: panda-server
          image: {{ include "panda-chat.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            privileged: true
          command: ["/opt/panda/entrypoint.sh"]
          args: ["panda-stack"]
          env:
            - {name: DOCKERD_STORAGE_DRIVER, value: {{ .Values.panda.storageDriver | quote }}}
          envFrom:
            - secretRef:
                name: {{ include "panda-chat.pandaSecretName" . }}
          # exec probes: panda-server binds 127.0.0.1, which kubelet httpGet
          # (pod IP) can't reach. ~20 min budget: a cold start is dockerd +
          # sandbox image pull + panda-server, and panda-server rebuilds its
          # EIP semantic index on boot (~8-10 min when the proxy embed cache
          # is cold) — a tighter budget CrashLoops mid-embed.
          startupProbe:
            exec:
              command: ["sh", "-c", "curl -sf http://127.0.0.1:2480/health"]
            periodSeconds: 5
            failureThreshold: 240
          livenessProbe:
            exec:
              command: ["sh", "-c", "curl -sf http://127.0.0.1:2480/health"]
            periodSeconds: 30
          resources: {{- toYaml .Values.panda.resources | nindent 12 }}
          volumeMounts:
            - {name: data, mountPath: /opt/data}
            # dockerd data-root on a node-local emptyDir (kubelet dir = ext4/xfs),
            # NOT the pod's overlay rootfs. overlay2 refuses to stack its
            # upperdir on another overlayfs (kernel: DCACHE_OP_REAL upperdir +
            # FILESYSTEM_MAX_STACK_DEPTH=2 → EINVAL → dockerd CrashLoop); on a
            # real fs it works natively. Ephemeral: the sandbox image is
            # re-pulled on cold start (entrypoint does this).
            - {name: docker-storage, mountPath: /var/lib/docker}
        {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "panda-chat.configMapName" . }}
        {{- if .Values.panda.enabled }}
        - name: docker-storage
          emptyDir: {{- toYaml .Values.panda.dockerStorage | nindent 12 }}
        {{- end }}
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "panda-chat.pvcName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
