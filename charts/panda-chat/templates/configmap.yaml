apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "panda-chat.configMapName" . }}
  labels: {{- include "panda-chat.labels" . | nindent 4 }}
data:
  # Hermes config — seeded into /opt/data/config.yaml.
  config.yaml: |
    model:
      default: {{ .Values.llm.model | quote }}
      provider: {{ .Values.llm.provider | quote }}
      api_key_env: {{ .Values.llm.apiKeyEnv | quote }}
      {{- with .Values.llm.baseUrl }}
      base_url: {{ . | quote }}
      {{- end }}
      {{- with .Values.llm.apiMode }}
      api_mode: {{ . | quote }}
      {{- end }}
    agent:
      system_prompt: |
        {{- .Values.systemPrompt | replace "{{ network }}" .Values.network | nindent 8 }}
    honcho:
      enabled: true
    {{- if .Values.langfuse.enabled }}
    plugins:
      enabled:
        - observability/langfuse
    {{- end }}
  {{- if .Values.panda.enabled }}
  # panda-server config — seeded to /opt/data/.config/panda/config.yaml. The
  # bot identity (PANDA_BOT_USERNAME / PANDA_BOT_TOKEN) lives in the Secret and
  # is substituted from the environment by panda's config loader; access tokens
  # are minted via client_credentials and never touch the PVC. The sandbox
  # backend is "direct" — Python runs as a subprocess inside the panda-server
  # container, relying on the Kubernetes pod boundary for isolation. No dockerd,
  # no sandbox image, no privileged container needed.
  panda-config.yaml: |
    server:
      host: "127.0.0.1"
      port: 2480
      base_url: "http://127.0.0.1:2480"
    sandbox:
      backend: direct
      timeout: 300
    storage:
      base_dir: "/opt/data/panda-storage"
    proxy:
      url: {{ .Values.panda.proxyUrl | quote }}
      auth:
        mode: "client_credentials"
        issuer_url: {{ .Values.panda.issuerUrl | quote }}
        client_id: {{ .Values.panda.clientId | quote }}
        username: "${PANDA_BOT_USERNAME}"
        password: "${PANDA_BOT_TOKEN}"
  {{- end }}
