apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "buildoor-overview.fullname" . }}-test-connection"
  labels:
    {{- include "buildoor-overview.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: curl
      image: curlimages/curl
      command: ['curl']
      args:
        - --location
        - --request
        - GET
        - '{{ include "buildoor-overview.fullname" . }}:{{ .Values.httpPort }}/api/overview/hosts'
  restartPolicy: Never
