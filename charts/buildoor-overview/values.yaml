# -- Overrides the chart's name
nameOverride: ""

# -- Overrides the chart's computed fullname
fullnameOverride: ""

# -- Number of replicas
replicas: 1

image:
  # -- buildoor container image repository
  repository: ethpandaops/buildoor
  # -- buildoor container image tag
  tag: main
  # -- buildoor container pull policy
  pullPolicy: Always

# -- HTTP port the overview UI listens on
httpPort: 8080

# -- buildoor instances the overview should aggregate (one URL per builder)
hosts: []
  # - http://buildoor-1.example.io
  # - http://buildoor-2.example.io

# -- Override the command. Leave empty to use the chart default.
customCommand: []

# -- Extra args appended to the buildoor overview command
extraArgs: []

ingress:
  # -- Ingress resource for the HTTP UI
  enabled: false
  # -- Ingress class
  className: ""
  # -- Annotations for Ingress
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  # -- Ingress hosts
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  # -- Ingress TLS
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

service:
  # -- Service type
  type: ClusterIP
  # -- NodePort (only used when service.type is NodePort)
  nodePort: ""

# -- Affinity configuration for pods
affinity: {}

# -- Annotations for the Deployment
annotations: {}

# -- Node selector for pods
nodeSelector: {}

# -- Pod labels
podLabels: {}

# -- Pod annotations
podAnnotations: {}

# -- Pod priority class
priorityClassName: null

# -- Resource requests and limits
resources: {}
# limits:
#   cpu: 200m
#   memory: 256Mi
# requests:
#   cpu: 50m
#   memory: 64Mi

# -- The security context for pods
securityContext:
  fsGroup: 10001
  runAsGroup: 10001
  runAsNonRoot: true
  runAsUser: 10001

# -- The security context for containers
containerSecurityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 10001

serviceAccount:
  # -- Specifies whether a service account should be created
  create: true
  # -- Annotations to add to the service account
  annotations: {}
  # -- The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# -- How long to wait until the pod is forcefully terminated
terminationGracePeriodSeconds: 30

# -- Tolerations for pods
tolerations: []

# -- Topology Spread Constraints for pods
topologySpreadConstraints: []

# -- Define the PodDisruptionBudget spec. If not set then a PodDisruptionBudget will not be created.
podDisruptionBudget: {}
# minAvailable: 1
# maxUnavailable: 1

# -- Update strategy for the Deployment
updateStrategy:
  type: RollingUpdate

# -- Additional init containers
initContainers: []

# -- Additional containers
extraContainers: []

# -- Additional volumes
extraVolumes: []

# -- Additional volume mounts
extraVolumeMounts: []

# -- Additional ports. Useful when using extraContainers
extraPorts: []

# -- Additional pod-level container ports
extraPodPorts: []

# -- Additional env variables passed to the buildoor container
extraEnv: []

# -- Liveness probe
livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

# -- Readiness probe
readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 2
  periodSeconds: 5

# -- ImagePullSecrets for the pod
imagePullSecrets: []
