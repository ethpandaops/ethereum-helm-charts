{{- /* Chart-managed Secret holding the active private key (only when privateKeyPem is set). */ -}}
{{- if and (not .Values.signing.existingSecret) .Values.signing.privateKeyPem }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "authenticatoor.signingSecretName" . }}
  labels:
    {{- include "authenticatoor.labels" . | nindent 4 }}
type: Opaque
stringData:
  active.pem: |
    {{- .Values.signing.privateKeyPem | nindent 4 }}
{{- end }}
{{- /* Chart-managed Secret holding previous public keys (for JWKS rotation). */ -}}
{{- if .Values.signing.previousKeys }}
{{- if and (not .Values.signing.existingSecret) .Values.signing.privateKeyPem }}
---
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "authenticatoor.previousKeysSecretName" . }}
  labels:
    {{- include "authenticatoor.labels" . | nindent 4 }}
type: Opaque
stringData:
{{- range .Values.signing.previousKeys }}
  prev-{{ .keyId }}.pub.pem: |
    {{- .publicKeyPem | nindent 4 }}
{{- end }}
{{- end }}
