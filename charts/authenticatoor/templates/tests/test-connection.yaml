apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "authenticatoor.fullname" . }}-test-connection"
  labels:
    {{- include "authenticatoor.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['{{ include "authenticatoor.fullname" . }}:{{ .Values.httpPort }}/healthz']
  restartPolicy: Never
