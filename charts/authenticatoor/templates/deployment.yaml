apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "authenticatoor.fullname" . }}
  labels:
    {{- include "authenticatoor.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.annotations | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  strategy:
    {{- toYaml .Values.updateStrategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "authenticatoor.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "authenticatoor.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "authenticatoor.serviceAccountName" . }}
    {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName }}
    {{- end }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      {{- if .Values.initContainers }}
      initContainers:
        {{- toYaml .Values.initContainers | nindent 8 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if gt (len .Values.customCommand) 0 }}
          command:
            {{- toYaml .Values.customCommand | nindent 12 }}
          {{- else }}
          command:
            - /usr/local/bin/authenticatoor
            - --config
            - /etc/authenticatoor/config.yaml
          {{- end }}
          {{- if gt (len .Values.extraArgs) 0 }}
          args:
            {{- toYaml .Values.extraArgs | nindent 12 }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/authenticatoor/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: keys
              mountPath: /etc/authenticatoor/keys
              {{- if eq (include "authenticatoor.keySource" .) "secret" }}
              readOnly: true
              {{- end }}
            {{- if .Values.signing.previousKeys }}
            - name: keys-prev
              mountPath: /etc/authenticatoor/keys-prev
              readOnly: true
            {{- end }}
            {{- if .Values.extraVolumeMounts }}
            {{- toYaml .Values.extraVolumeMounts | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.httpPort }}
              protocol: TCP
            {{- if .Values.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.metricsPort }}
              protocol: TCP
            {{- end }}
            {{- if .Values.extraPodPorts }}
            {{- toYaml .Values.extraPodPorts | nindent 12 }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
          {{- if .Values.extraEnv }}
            {{- toYaml .Values.extraEnv | nindent 12 }}
          {{- end }}
        {{- if .Values.extraContainers }}
        {{- toYaml .Values.extraContainers | nindent 8 }}
        {{- end }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      topologySpreadConstraints:
        {{- toYaml .Values.topologySpreadConstraints | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      volumes:
        - name: config
          configMap:
            name: {{ include "authenticatoor.fullname" . }}-config
        - name: keys
          {{- $source := include "authenticatoor.keySource" . }}
          {{- if eq $source "secret" }}
          secret:
            secretName: {{ include "authenticatoor.signingSecretName" . }}
            defaultMode: 0400
          {{- else if eq $source "pvc" }}
          persistentVolumeClaim:
            claimName: {{ include "authenticatoor.pvcName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if .Values.signing.previousKeys }}
        - name: keys-prev
          secret:
            secretName: {{ include "authenticatoor.previousKeysSecretName" . }}
            defaultMode: 0400
        {{- end }}
        {{- if .Values.extraVolumes }}
        {{- toYaml .Values.extraVolumes | nindent 8 }}
        {{- end }}
